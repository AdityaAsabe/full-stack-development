<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio element</title>
</head>
<body>
    <form action="/server">
        <div>
            Choose fruit :
            <br>
            <input type="radio" name="fruits" id="apple" value="apple" >
            <label for="apple">Apple</label>
            <br>
            <input type="radio" name="fruits" id="banana" value="banana" >
            <label for="banana">Banana</label>
            <br>
            <input type="radio" name="fruits" id="mango" value="mango" >
            <label for="mango">Mango</label>
            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

        <hr>
        
        <div>
            Choose your subject :
            <br>
            <input type="checkbox" name="subject" id="math" value="maths" >
            <label for="math">Mathematics</label>
            <br>
            <input type="checkbox" name="subject" id="mar" value="marathi" >
            <label for="mar">Marathi</label>
            <br>
            <input type="checkbox" name="subject" id="sci" value="science" >
            <label for="sci">Science</label>
            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</body>
</html>
