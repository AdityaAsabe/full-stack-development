<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid Practice</title>
    <style>
        .container {
            max-width: 600px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(50px, auto);
            gap: 2px;
            background-color: skyblue;
            padding: 5px;
        }

        .head {
            background-color: #333;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }

        .items {
            background-color: white;
            text-align: center;
            padding: 10px;
        }
</style>
</head>
<body>
    <div class="container">
        <div class="head">Features</div>
        <div class="head">Flexbox</div>
        <div class="head">Grid</div>
        <div class="items">Dimenstions</div>
        <div class="items">1D</div>
        <div class="items">2D</div>
        <div class="items">Direction</div>
        <div class="items">Row OR Column</div>
        <div class="items">Row AND Column</div>
        <div class="items">Control</div>
        <div class="items">Content-Based</div>
        <div class="items">Layout-Based</div>
        <div class="items">Alignment</div>
        <div class="items">Easy</div>
        <div class="items">More Powerful</div>
    </div>
</body>
</html>
