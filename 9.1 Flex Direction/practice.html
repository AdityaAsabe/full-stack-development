<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flex Direction Practice</title>
  <style>
    .container {
      display: flex;
      flex-direction: row; /* try: column, row-reverse, column-reverse */
      gap: 10px;
      border: 2px solid black;
      padding: 10px;
    }

    .box {
      background-color: lightblue;
      padding: 20px;
      border: 1px solid blue;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

</body>
</html>
