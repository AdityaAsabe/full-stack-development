<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<body>
    <table>
        <caption> Food Menue </caption>
            <thead>
                <tr>
                    <th rowspan="2">Items</th>
                    <th colspan="2">Price</th>
                </tr>
                <tr>
                    <th>IND</th>
                    <th>USD</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Frooti</td>
                    <td>10</td>
                    <td>0.14</td>
                </tr>
                <tr>
                    <td>Samosa</td>
                    <td>12</td>
                    <td>0.18</td>
                </tr>
                <tr>
                    <td>Chips</td>
                    <td>20</td>
                    <td>2.14</td>
                </tr>
            </tbody>
    </table>
</body>
</html>
