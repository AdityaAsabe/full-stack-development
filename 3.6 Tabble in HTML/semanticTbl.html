<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<body>
    <table>
        <caption> Student Result Sheet </caption>
        <thead>
            <tr>
                <th>Names</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aditya</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Nihar</td>
                <td>30</td>
            </tr>
            <tr>
                <td>Aish</td>
                <td>20</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Sum =</td>
                <td>60</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
